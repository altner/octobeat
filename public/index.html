<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSS Aggregator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3354;
      --accent: #6c8eff;
      --accent2: #a78bfa;
      --text: #e2e8f0;
      --muted: #8892b0;
      --danger: #ff6b6b;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header .badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 20px;
    }

    header .spacer { flex: 1; }

    header button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    header button:hover { opacity: 0.85; }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: calc(100vh - 57px);
    }

    /* Sidebar */
    aside {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    aside h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 600;
    }

    .feed-list { display: flex; flex-direction: column; gap: 6px; }

    .feed-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      border: 1px solid transparent;
    }
    .feed-item:hover { background: var(--surface2); }
    .feed-item.active { background: var(--surface2); border-color: var(--border); }

    .feed-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .feed-name {
      font-size: 14px;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .feed-remove {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }
    .feed-item:hover .feed-remove { opacity: 1; }
    .feed-remove:hover { color: var(--danger); }

    /* Add feed form */
    .add-feed {
      border-top: 1px solid var(--border);
      padding-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .add-feed input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    .add-feed input:focus { border-color: var(--accent); }
    .add-feed input::placeholder { color: var(--muted); }

    .add-feed button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .add-feed button:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Main content */
    main {
      padding: 24px;
      overflow-y: auto;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .search-box {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      max-width: 400px;
    }
    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--muted); }

    .count { color: var(--muted); font-size: 13px; }

    .articles { display: flex; flex-direction: column; gap: 12px; }

    .article-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      transition: border-color 0.2s, transform 0.1s;
    }
    .article-card:hover { border-color: var(--accent); transform: translateY(-1px); }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .article-feed {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      background: rgba(108,142,255,0.1);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .article-date { font-size: 12px; color: var(--muted); }

    .article-title {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .article-title a {
      color: var(--text);
      text-decoration: none;
    }
    .article-title a:hover { color: var(--accent); }

    .article-summary {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .state .icon { font-size: 40px; margin-bottom: 12px; }
    .state p { font-size: 15px; }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .errors {
      background: rgba(255,107,107,0.08);
      border: 1px solid rgba(255,107,107,0.3);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--danger);
    }

    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
      aside { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<header>
  <h1>📡 RSS Aggregator</h1>
  <span class="badge" id="feedCount">0 Feeds</span>
  <div class="spacer"></div>
  <button onclick="loadArticles()">↻ Aktualisieren</button>
</header>

<div class="layout">
  <aside>
    <h2>Feeds</h2>
    <div class="feed-list" id="feedList"></div>

    <div class="add-feed">
      <h2>Feed hinzufügen</h2>
      <input type="text" id="newFeedName" placeholder="Name (z.B. Heise)" />
      <input type="url" id="newFeedUrl" placeholder="RSS URL" />
      <button onclick="addFeed()">+ Hinzufügen</button>
    </div>
  </aside>

  <main>
    <div class="toolbar">
      <input class="search-box" id="searchBox" type="text" placeholder="Artikel durchsuchen…" oninput="renderArticles()" />
      <span class="count" id="articleCount"></span>
    </div>
    <div id="articlesContainer">
      <div class="state"><div class="spinner"></div><p>Lade Artikel…</p></div>
    </div>
  </main>
</div>

<script>
  let allArticles = [];
  let activeFilter = null;

  async function loadFeeds() {
    const res = await fetch('/api/feeds');
    const feeds = await res.json();
    document.getElementById('feedCount').textContent = `${feeds.length} Feed${feeds.length !== 1 ? 's' : ''}`;
    const list = document.getElementById('feedList');
    list.innerHTML = '';

    // "Alle" item
    const all = document.createElement('div');
    all.className = 'feed-item' + (activeFilter === null ? ' active' : '');
    all.innerHTML = `<div class="feed-dot" style="background:#a78bfa"></div><span class="feed-name">Alle Feeds</span>`;
    all.onclick = () => { activeFilter = null; document.querySelectorAll('.feed-item').forEach(el => el.classList.remove('active')); all.classList.add('active'); renderArticles(); };
    list.appendChild(all);

    feeds.forEach(feed => {
      const item = document.createElement('div');
      item.className = 'feed-item' + (activeFilter === feed.url ? ' active' : '');
      item.innerHTML = `
        <div class="feed-dot"></div>
        <span class="feed-name" title="${feed.url}">${feed.name}</span>
        <button class="feed-remove" title="Entfernen" onclick="removeFeed(event, '${feed.url}')">×</button>
      `;
      item.onclick = (e) => {
        if (e.target.classList.contains('feed-remove')) return;
        activeFilter = feed.url;
        document.querySelectorAll('.feed-item').forEach(el => el.classList.remove('active'));
        item.classList.add('active');
        renderArticles();
      };
      list.appendChild(item);
    });
  }

  async function addFeed() {
    const name = document.getElementById('newFeedName').value.trim();
    const url = document.getElementById('newFeedUrl').value.trim();
    if (!name || !url) return alert('Bitte Name und URL eingeben.');
    const res = await fetch('/api/feeds', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, url })
    });
    if (!res.ok) { const d = await res.json(); return alert(d.error); }
    document.getElementById('newFeedName').value = '';
    document.getElementById('newFeedUrl').value = '';
    await loadFeeds();
    await loadArticles();
  }

  async function removeFeed(e, url) {
    e.stopPropagation();
    if (!confirm('Feed entfernen?')) return;
    await fetch('/api/feeds', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });
    if (activeFilter === url) activeFilter = null;
    await loadFeeds();
    await loadArticles();
  }

  async function loadArticles() {
    document.getElementById('articlesContainer').innerHTML =
      '<div class="state"><div class="spinner"></div><p>Lade Artikel…</p></div>';
    try {
      const res = await fetch('/api/articles');
      const data = await res.json();
      allArticles = data.articles;
      renderArticles(data.errors);
    } catch (err) {
      document.getElementById('articlesContainer').innerHTML =
        `<div class="state"><div class="icon">⚠️</div><p>Fehler beim Laden: ${err.message}</p></div>`;
    }
  }

  function renderArticles(errors) {
    const query = document.getElementById('searchBox').value.toLowerCase();
    let articles = allArticles;

    if (activeFilter) articles = articles.filter(a => a.feedUrl === activeFilter);
    if (query) articles = articles.filter(a =>
      a.title.toLowerCase().includes(query) || a.summary.toLowerCase().includes(query)
    );

    document.getElementById('articleCount').textContent =
      articles.length > 0 ? `${articles.length} Artikel` : '';

    const container = document.getElementById('articlesContainer');

    let html = '';

    if (errors && errors.length > 0) {
      html += `<div class="errors">⚠️ Fehler bei ${errors.length} Feed(s): ${errors.map(e => `${e.feed} (${e.error})`).join(', ')}</div>`;
    }

    if (articles.length === 0) {
      html += '<div class="state"><div class="icon">🔍</div><p>Keine Artikel gefunden.</p></div>';
    } else {
      html += '<div class="articles">';
      articles.forEach(a => {
        const date = a.pubDate ? new Date(a.pubDate).toLocaleDateString('de-DE', {
          day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
        }) : '';
        const summary = a.summary.replace(/<[^>]*>/g, '').slice(0, 200);
        html += `
          <div class="article-card">
            <div class="article-meta">
              <span class="article-feed">${a.feedName}</span>
              ${date ? `<span class="article-date">${date}</span>` : ''}
            </div>
            <div class="article-title">
              <a href="${a.link}" target="_blank" rel="noopener">${a.title}</a>
            </div>
            ${summary ? `<div class="article-summary">${summary}</div>` : ''}
          </div>`;
      });
      html += '</div>';
    }

    container.innerHTML = html;
  }

  // Init
  loadFeeds();
  loadArticles();
</script>
</body>
</html>
