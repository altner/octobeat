# Default RSS feeds. data/feeds.json is the active source list.
rss_feeds:
  # Independent blogs & non-profit media
  - https://netzpolitik.org/feed/
  - https://www.basicthinking.de/blog/feed/
  # - https://www.stadt-bremerhaven.de/feed/  # zu viel irrelevanter Content
  - https://www.kuketz-blog.de/feed/          # Privacy and security
  - https://www.mobiflip.de/feed/
  - https://carta.info/feed/                  # Media and digital
  - https://irights.info/feed                 # Digital rights

  # Travel blogs
  - https://reisehappen.de/feed/
  - https://www.fernwehking.de/feed/
  - https://nomadblogger.de/feed/
  - https://www.reisefreiheit.org/feed/

  - https://www.metacheles.de/rss/
  - https://uberblogr.de/rss
  - https://uberblogr.de/rss-trending

# Public Mastodon instances used as additional Fediverse search windows.
# The own MASTODON_INSTANCE from .env is searched first and does not need to be listed here.
mastodon_instances:
  - https://mastodon.social
  - https://mastodon.online
  - https://troet.cafe
  - https://social.tchncs.de
  # - https://social.heise.de  # kommerziell
  - https://chaos.social
  - https://digitalcourage.social
  - https://norden.social
  - https://berlin.social
  # - https://troet.uberblogr.de  # Search-API deaktiviert (HTTP 404)

# Additional social searches derived from RSS article URLs.
social_search:
  max_rss_article_domains: 50

# Bluesky
bluesky:
  enabled: true
  limit: 25


# Spam filter for curators
curator_filter:
  min_followers: 10
  max_following: 5000
  min_posts: 5

# Article filter
article_filter:
  max_age_hours: 48  # Ignore articles older than 48h
  top_n: 50          # Number of articles in feed.json

# Persistent crawler memory.
embeddings:
  enabled: true                    # set false to skip (faster, no sentence-transformers needed)
  # model: paraphrase-multilingual-MiniLM-L12-v2  # set in embedder.py

learning:
  enabled: true
  db_path: ../data/octobeat.sqlite3
  min_curator_signals: 3
  max_curator_bonus: 0.25
  source_pruning:
    enabled: true
    auto_remove: false
    min_runs: 5
    min_age_days: 14
    require_no_social_signals: true

# Domains that never enter the feed
domain_blacklist:
  - t.co
  - bit.ly
  - twitter.com
  - x.com
  - instagram.com
  - facebook.com
  - tiktok.com

