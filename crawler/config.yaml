# Semantic category anchors for embedding-based classification (Stufe 2).
# Each value is a descriptive text that defines the category semantically.
# The embedder computes cosine similarity between article titles and these texts.
# Tip: richer, more specific texts → better precision.
tag_anchors:
  ki: >
    Künstliche Intelligenz, Machine Learning, Large Language Models, LLM,
    ChatGPT, GPT-4, Claude, Gemini, KI-Systeme, neuronale Netze,
    Sprachmodelle, AI-Tools, Bildgenerierung, Text-zu-Bild
