  datenschutz:
    - datenschutz
    - tracking
    - überwachung
    - ueberwachung
    - spyware
    - staatstrojaner
    - privatsphäre
    - privatsphaere
  sicherheit:
    - sicherheit
    - cyber
    - hack
    - malware
    - sicherheitslücke
    - sicherheitsluecke
    - schwachstelle
  netzpolitik:
    - netzpolitik
    - digitale freiheitsrechte
    - plattformregulierung
    - desinformation
    - moderation
  politik:
    - bundesregierung
    - kanzler
    - bundestag
    - partei
    - wahl
    - abschiebung
    - iran
    - israel
    - nahost
  wirtschaft:
    - börse
    - boerse
    - aktie
    - markt
    - unternehmen
    - übernahme
    - uebernahme
    - temu
    - strafe
  arbeit:
    - arbeitszeit
    - arbeitsrecht
    - gewerkschaft
    - job
    - beruf
  kultur:
