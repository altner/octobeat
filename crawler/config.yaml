# Seed domains we know and trust
seed_domains:
  - netzpolitik.org
  - heise.de
  - golem.de
  - taz.de
  - spiegel.de
  - faz.net
  - sueddeutsche.de

# RSS feeds — German blogs and tech media
rss_feeds:
  # Tech and web
  - https://www.heise.de/rss/heise-atom.xml
  - https://www.golem.de/rss.php
  - https://netzpolitik.org/feed/
  - https://t3n.de/rss.xml
  - https://www.basicthinking.de/blog/feed/
  - https://mixed.de/feed/
  - https://www.stadt-bremerhaven.de/feed/   # Caschy's Blog
  - https://www.ifun.de/feed/
  - https://www.winfuture.de/rss.xml
  - https://www.kuketz-blog.de/feed/          # Privacy and security
  - https://www.mobiflip.de/feed/
  - https://www.nextpit.de/feed/rss           # Android & Mobile
  - https://www.heise.de/tp/news-atom.xml     # Telepolis
  - https://carta.info/feed/                  # Media and digital
  - https://irights.info/feed                 # Digital rights

  # Travel
  - https://www.travelbook.de/feed/
  - https://www.reisereporter.de/feed/
  - https://reisehappen.de/feed/
  - https://www.fernwehking.de/feed/
  - https://nomadblogger.de/feed/
  - https://www.reisefreiheit.org/feed/

  - https://www.metacheles.de/rss/

# Bluesky
bluesky:
  enabled: true
  limit: 25

# Include Hacker News?
hackernews:
  enabled: false
  min_score: 10
  top_n: 100

# Spam filter for curators
curator_filter:
  min_followers: 10
  max_following: 5000
  min_posts: 5

# Article filter
article_filter:
  max_age_hours: 48  # Ignore articles older than 48h
  top_n: 50          # Number of articles in feed.json

# Persistent crawler memory.
learning:
  enabled: true
  db_path: ../data/octobeat.sqlite3
  min_curator_signals: 3
  max_curator_bonus: 0.25

# Domains that never enter the feed
domain_blacklist:
  - t.co
  - bit.ly
  - twitter.com
  - instagram.com
  - facebook.com
  - tiktok.com

# Qualified tags from title, URL slug, and existing signal tags.
# Do not assign tags solely from the source domain.
tag_rules:
  ki:
    - künstliche intelligenz
    - kuenstliche intelligenz
    - artificial intelligence
    - grokipedia
    - chatgpt
    - openai
    - llm
