<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedbeat – Feeds</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --surface2:#22263a;
      --border:  #2e3354;
      --accent:  #6c8eff;
      --accent2: #a78bfa;
      --text:    #e2e8f0;
      --muted:   #8892b0;
      --radius:  10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header a {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    header span {
      font-size: 14px;
      color: var(--muted);
    }

    main {
      max-width: 700px;
      margin: 0 auto;
      padding: 32px 24px 60px;
    }

    h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text);
    }

    .count {
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
      margin-left: 8px;
    }

    .feed-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .feed-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.2s;
    }
    .feed-card:hover { border-color: var(--accent); }

    .feed-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .feed-info { flex: 1; min-width: 0; }

    .feed-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .feed-url {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .feed-link {
      color: var(--muted);
      font-size: 13px;
      text-decoration: none;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .feed-link:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
  </style>
</head>
<body>

<header>
  <a href="index.html">feedbeat</a>
  <span>/ Feeds</span>
</header>

<main>
  <h2>RSS-Feeds <span class="count" id="count"></span></h2>
  <div class="feed-list" id="feedList">
    <div class="state">Lade Feeds…</div>
  </div>
</main>

<script>
  function domainFromUrl(url) {
    try { return new URL(url).hostname.replace("www.", ""); } catch { return url; }
  }

  function nameFromUrl(url) {
    const domain = domainFromUrl(url);
    const names = {
      "heise.de":            "Heise Online",
      "golem.de":            "Golem",
      "netzpolitik.org":     "Netzpolitik",
      "t3n.de":              "t3n",
      "basicthinking.de":    "Basic Thinking",
      "mixed.de":            "Mixed",
      "stadt-bremerhaven.de":"Caschys Blog",
      "ifun.de":             "ifun",
      "winfuture.de":        "WinFuture",
      "kuketz-blog.de":      "Kuketz Blog",
      "mobiflip.de":         "Mobiflip",
      "nextpit.de":          "NextPit",
      "telepolis.de":        "Telepolis",
      "carta.info":          "Carta",
      "irights.info":        "iRights",
      "travelbook.de":       "Travelbook",
      "reisereporter.de":    "Reisereporter",
      "reisehappen.de":      "Reisehappen",
      "fernwehking.de":      "Fernwehking",
      "nomadblogger.de":     "Nomadblogger",
      "reisefreiheit.org":   "Reisefreiheit",
    };
    return names[domain] || domain;
  }

  function emoji(url) {
    const domain = domainFromUrl(url);
    if (domain.includes("reise") || domain.includes("travel") ||
        domain.includes("fernweh") || domain.includes("nomad") ||
        domain.includes("reisefreiheit")) return "✈️";
    return "📰";
  }

  async function load() {
    try {
      const r = await fetch("data/feeds.json?t=" + Date.now());
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const feeds = await r.json();

      document.getElementById("count").textContent = `${feeds.length} Quellen`;

      const list = document.getElementById("feedList");
      list.innerHTML = feeds.map(url => `
        <div class="feed-card">
          <div class="feed-icon">${emoji(url)}</div>
          <div class="feed-info">
            <div class="feed-name">${nameFromUrl(url)}</div>
            <div class="feed-url">${url}</div>
          </div>
          <a class="feed-link" href="${url}" target="_blank" rel="noopener">Feed ↗</a>
        </div>
      `).join("");
    } catch(e) {
      document.getElementById("feedList").innerHTML =
        `<div class="state">Fehler: ${e.message}<br><small>Bitte zuerst python3 crawler/main.py ausführen</small></div>`;
    }
  }

  load();
</script>
</body>
</html>
